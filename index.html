<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>งานการพยาบาลห้องผ่าตัด | โรงพยาบาลมหาวิทยาลัยพะเยา</title>

<meta name="description" content="เว็บไซต์งานการพยาบาลห้องผ่าตัด โรงพยาบาลมหาวิทยาลัยพะเยา ข้อมูลบุคลากร ข่าวประชาสัมพันธ์ เอกสาร และกิจกรรม">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== ROOT ===== */
:root{
--primary:#0f8a5f;
--primary-dark:#0a6c49;
--primary-light:#eaf7f3;
--text:#1f2933;
--gray:#6b7280;
--border:#e5e7eb;
--bg:#f8fafc;
}

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'IBM Plex Sans Thai',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* HEADER */
.header{
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:18px;
color:var(--primary);
}

.navbar ul{
display:flex;
list-style:none;
gap:26px;
}

.navbar a{
text-decoration:none;
color:var(--text);
font-weight:500;
}

.navbar a:hover{color:var(--primary);}
.mobile-menu{display:none;}

/* HERO */
.hero{
position:relative;
height:75vh;
overflow:hidden;
}

.hero-slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.hero-slider img.active{opacity:1;}

.hero-overlay{
position:relative;
height:100%;
background:rgba(0,0,0,0.35);
display:flex;
align-items:center;
}

.hero-content{color:white;}
.hero h1{font-size:42px;}
.hero p{margin:20px 0;}

.btn-primary{
background:var(--primary);
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
}

/* SECTION */
section{padding:70px 0;}
.section-title{text-align:center;color:var(--primary);margin-bottom:30px;}

/* GRID */
.about-grid{display:grid;grid-template-columns:1fr 260px;gap:40px;}
.news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}

.news-card,.doc-card{
background:white;
padding:20px;
border-radius:10px;
border:1px solid var(--border);
}

/* SLIDER COMMON */
.knowledge-slider,
.slider-track{
position:relative;
max-width:800px;
margin:auto;
height:300px;
overflow:hidden;
}

.knowledge-slider img,
.slider-track img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.knowledge-slider img.active,
.slider-track img.active{
opacity:1;
}

/* schedule btn */
.schedule-slider{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.schedule-slider button{
width:40px;
height:40px;
border-radius:50%;
border:none;
cursor:pointer;
}

/* footer */
.footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="container nav-container">
<div class="logo"><i class="fa-solid fa-hospital"></i> OR NURSE UPH</div>
<nav class="navbar">
<ul>
<li><a href="#">เกี่ยวกับเรา</a></li>
<li><a href="pages/personel.html">บุคลากร</a></li>
<li><a href="#">ข่าว</a></li>
<li><a href="#">ดาวน์โหลด</a></li>
<li><a href="#">ติดต่อ</a></li>
</ul>
</nav>
</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-slider">
<img src="assets/img/banner1.jpg" class="active">
<img src="assets/img/IMG_1624.jpg">
</div>

<div class="hero-overlay">
<div class="container hero-content">
<h1>งานการพยาบาลห้องผ่าตัด</h1>
<p>โรงพยาบาลมหาวิทยาลัยพะเยา</p>
</div>
</div>
</section>

<!-- ABOUT -->
<section class="about">
<div class="container">
<h2 class="section-title">เกี่ยวกับหน่วยงาน</h2>
<div class="about-grid">
<div>
<p>บริการด้านการผ่าตัดครบวงจร</p>
</div>
</div>
</div>
</section>

<!-- NEWS -->
<section class="news">
<div class="container">
<h2 class="section-title">ข่าว</h2>
<div class="news-grid">
<div class="news-card">ข่าว 1</div>
<div class="news-card">ข่าว 2</div>
</div>
</div>
</section>

<!-- DOCUMENT -->
<section class="documents">
<div class="container">
<h2 class="section-title">เอกสาร</h2>
<div class="doc-grid">
<a href="#" class="doc-card">คู่มือ</a>
<a href="#" class="doc-card">แนวทาง</a>
</div>
</div>
</section>

<!-- KNOWLEDGE -->
<section class="knowledge">
<div class="container">
<h2 class="section-title">สาระน่ารู้</h2>

<div class="knowledge-slider">
<img src="assets/img/01.jpg" class="active">
<img src="assets/img/02.jpg">
</div>

</div>
</section>

<!-- SCHEDULE -->
<section class="schedule">
<div class="container">
<h2 class="section-title">ตารางแพทย์</h2>

<div class="schedule-slider">
<button class="prev"><</button>

<div class="slider-track">
<img src="assets/img/Uro.jpg" class="active">
<img src="assets/img/Med.jpg">
</div>

<button class="next">></button>
</div>

</div>
</section>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 OR Nurse UPH</p>
</footer>

<script>

// HERO
let hero = document.querySelectorAll(".hero-slider img");
let h = 0;
setInterval(()=>{
hero[h].classList.remove("active");
h=(h+1)%hero.length;
hero[h].classList.add("active");
},5000);

// KNOWLEDGE
let know = document.querySelectorAll(".knowledge-slider img");
let k=0;
setInterval(()=>{
know[k].classList.remove("active");
k=(k+1)%know.length;
know[k].classList.add("active");
},5000);

// SCHEDULE
let sch = document.querySelectorAll(".slider-track img");
let s=0;

function show(){
sch.forEach(i=>i.classList.remove("active"));
sch[s].classList.add("active");
}

document.querySelector(".next").onclick=()=>{
s=(s+1)%sch.length; show();
};

document.querySelector(".prev").onclick=()=>{
s=(s-1+sch.length)%sch.length; show();
};

</script>

</body>
</html>
