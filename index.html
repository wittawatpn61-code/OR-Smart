<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>งานการพยาบาลห้องผ่าตัด | โรงพยาบาลมหาวิทยาลัยพะเยา</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
:root{
--primary:#0f8a5f;
--dark:#0a6c49;
--light:#eaf7f3;
--text:#1f2933;
--border:#e5e7eb;
--bg:#f8fafc;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'IBM Plex Sans Thai',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ===== HEADER ===== */
.header{
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
}

.logo{color:var(--primary);font-weight:600;}

.navbar ul{
display:flex;
list-style:none;
gap:20px;
}

.navbar a{text-decoration:none;color:var(--text);}
.navbar a:hover{color:var(--primary);}

.mobile-menu{display:none;cursor:pointer;}

/* ===== HERO + SLIDER ===== */
.hero{
position:relative;
height:75vh;
overflow:hidden;
}

.slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slider img.active{opacity:1;}

.overlay{
background:rgba(0,0,0,0.35);
height:100%;
display:flex;
align-items:center;
}

.hero-content{
color:white;
max-width:600px;
}

.btn{
background:var(--primary);
color:white;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
}

/* ===== SECTION ===== */
section{padding:60px 0;}

.title{
text-align:center;
margin-bottom:30px;
color:var(--primary);
}

/* ===== GRID ===== */
.grid{
display:grid;
gap:20px;
}

.grid-3{
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

/* ===== CARD ===== */
.card{
background:white;
padding:20px;
border-radius:12px;
border:1px solid var(--border);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* ===== KNOWLEDGE ===== */
.knowledge-slider{
position:relative;
height:300px;
max-width:800px;
margin:auto;
overflow:hidden;
border-radius:12px;
}

/* ===== FOOTER ===== */
.footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.navbar{display:none;}
.navbar.active{display:block;}
.mobile-menu{display:block;}
.hero{height:60vh;}
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="container nav-container">

<div class="logo">
<i class="fa-solid fa-hospital"></i> OR NURSE UPH
</div>

<nav class="navbar">
<ul>
<li><a href="#">เกี่ยวกับ</a></li>
<li><a href="#">บุคลากร</a></li>
<li><a href="#">ข่าว</a></li>
<li><a href="#">เอกสาร</a></li>
<li><a href="#">ติดต่อ</a></li>
</ul>
</nav>

<div class="mobile-menu">
<i class="fa-solid fa-bars"></i>
</div>

</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="slider">
<img src="assets/img/banner1.jpg" class="active">
<img src="assets/img/IMG_1624.jpg">
<img src="assets/img/01.jpg">
</div>

<div class="overlay">
<div class="container hero-content">
<h1>งานการพยาบาลห้องผ่าตัด</h1>
<p>บริการปลอดภัย ได้มาตรฐาน ทันสมัย</p>
<a href="#" class="btn">ดูเพิ่มเติม</a>
</div>
</div>
</section>

<!-- NEWS -->
<section>
<div class="container">
<h2 class="title">ข่าวประชาสัมพันธ์</h2>

<div class="grid grid-3">
<div class="card">พัฒนาห้องผ่าตัด</div>
<div class="card">อบรมควบคุมเชื้อ</div>
<div class="card">กิจกรรม OR</div>
</div>

</div>
</section>

<!-- DOCUMENT -->
<section>
<div class="container">
<h2 class="title">เอกสาร</h2>

<div class="grid grid-3">
<a href="#" class="card">คู่มือ</a>
<a href="#" class="card">แนวทาง</a>
<a href="#" class="card">แบบฟอร์ม</a>
</div>

</div>
</section>

<!-- KNOWLEDGE -->
<section>
<div class="container">
<h2 class="title">สาระน่ารู้</h2>

<div class="slider knowledge-slider">
<img src="assets/img/01.jpg" class="active">
<img src="assets/img/02.jpg">
<img src="assets/img/03.jpg">
</div>

</div>
</section>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 OR Nurse UPH</p>
</footer>

<script>

// ใช้ function เดียวสำหรับทุก slider
function autoSlider(selector){
let slides = document.querySelectorAll(selector);
let i = 0;

setInterval(()=>{
slides[i].classList.remove("active");
i = (i+1) % slides.length;
slides[i].classList.add("active");
},5000);
}

// เรียกใช้
autoSlider(".hero .slider img");
autoSlider(".knowledge-slider img");

// mobile menu
document.querySelector(".mobile-menu").onclick = ()=>{
document.querySelector(".navbar").classList.toggle("active");
};

</script>

</body>
</html>
