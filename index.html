<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>งานการพยาบาลห้องผ่าตัด | โรงพยาบาลมหาวิทยาลัยพะเยา</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--primary:#0f8a5f;
--bg:#f8fafc;
--text:#1f2933;
--border:#e5e7eb;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'IBM Plex Sans Thai',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
.header{
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.navbar ul{
display:flex;
gap:20px;
list-style:none;
}

.navbar a{
text-decoration:none;
color:var(--text);
}

/* HERO SLIDER */
.hero{
position:relative;
height:80vh;
overflow:hidden;
}

.hero-slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s ease;
}

.hero-slider img.active{
opacity:1;
}

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
}

/* SECTION */
section{padding:60px 20px;}

.section-title{
text-align:center;
margin-bottom:30px;
color:var(--primary);
}

/* KNOWLEDGE SLIDER */
.knowledge-slider{
position:relative;
max-width:900px;
margin:auto;
height:300px;
overflow:hidden;
border-radius:12px;
}

.k-slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.k-slide.active{
opacity:1;
}

.footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="nav-container">
<div><i class="fa-solid fa-hospital"></i> OR NURSE UPH</div>

<nav class="navbar">
<ul>
<li><a href="#">เกี่ยวกับเรา</a></li>
<li><a href="#">บุคลากร</a></li>
<li><a href="#">ข่าว</a></li>
<li><a href="#">เอกสาร</a></li>
</ul>
</nav>
</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-slider">
<img src="assets/img/banner1.jpg" class="slide active">
<img src="assets/img/IMG_1624.jpg" class="slide">
<img src="assets/img/01.jpg" class="slide">
</div>

<div class="hero-overlay">
<div>
<h1>งานการพยาบาลห้องผ่าตัด</h1>
<p>บริการปลอดภัย ได้มาตรฐาน</p>
</div>
</div>
</section>

<!-- KNOWLEDGE -->
<section class="knowledge">
<h2 class="section-title">สาระน่ารู้</h2>

<div class="knowledge-slider">
<img src="assets/img/01.jpg" class="k-slide active">
<img src="assets/img/02.jpg" class="k-slide">
<img src="assets/img/03.jpg" class="k-slide">
<img src="assets/img/06.jpg" class="k-slide">
</div>

</section>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 OR Nurse UPH</p>
</footer>

<script>

/* HERO SLIDER */
let heroSlides = document.querySelectorAll(".slide");
let heroIndex = 0;

setInterval(()=>{
heroSlides[heroIndex].classList.remove("active");
heroIndex = (heroIndex + 1) % heroSlides.length;
heroSlides[heroIndex].classList.add("active");
},5000);

/* KNOWLEDGE SLIDER */
let kSlides = document.querySelectorAll(".k-slide");
let kIndex = 0;

setInterval(()=>{
kSlides[kIndex].classList.remove("active");
kIndex = (kIndex + 1) % kSlides.length;
kSlides[kIndex].classList.add("active");
},5000);

</script>

</body>
</html>
